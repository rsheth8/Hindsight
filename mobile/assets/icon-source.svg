<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="28%" cy="18%" r="130%">
      <stop offset="0" stop-color="#241509"/>
      <stop offset="1" stop-color="#0c0907"/>
    </radialGradient>
  </defs>

  <!-- full-bleed espresso background (iOS applies the rounded mask) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- two dashed timestamp legs: when you call it (left) → when it resolves (right) -->
  <line x1="280" y1="208" x2="280" y2="816" stroke="#6b5c48" stroke-width="22" stroke-linecap="round" stroke-dasharray="2 118"/>
  <line x1="744" y1="208" x2="744" y2="816" stroke="#6b5c48" stroke-width="22" stroke-linecap="round" stroke-dasharray="2 118"/>

  <!-- the gold price line across the interval (the H crossbar) -->
  <path d="M280 552 L456 600 L600 408 L744 472"
        fill="none" stroke="#f0c560" stroke-width="70" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- the two timestamp dots (warm white, see docs/design.md §4) -->
  <circle cx="280" cy="552" r="62" fill="#f6ede0"/>
  <circle cx="744" cy="472" r="62" fill="#f6ede0"/>
</svg>
