  <path d="M512 540 L578 474 L642 508 L706 384 L770 300 L854 268"
        fill="none" stroke="url(#spark)" stroke-width="38" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>

  <circle cx="512" cy="540" r="28" fill="#0a0c11" stroke="#7dffc6" stroke-width="13"/>
</svg>
