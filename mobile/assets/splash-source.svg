  </defs>

  <!-- transparent background; Expo composes this over backgroundColor #0a0c11 -->
  <line x1="512" y1="300" x2="512" y2="724" stroke="#6b788b" stroke-width="6" stroke-dasharray="14 18" opacity="0.7"/>

  <path d="M170 628 L234 596 L298 636 L362 560 L426 590 L490 516 L512 540"
